            // 合计行
            const totalPercent = grandTarget > 0 ? ((grandTotal / grandTarget) * 100) : 0;
            const totalDPercent = grandDTarget > 0 ? ((grandDSales / grandDTarget) * 100) : 0;

            let tfootHtml = `<tr>
                <td>招商业务部</td>
                <td>${grandTarget.toFixed(1)}</td>
                <td>${grandTotal.toFixed(1)}</td>
                <td>${getProgressBarHtml(totalPercent)}</td>
                <td>${grandDTarget.toFixed(1)}</td>
                <td>${grandDSales.toFixed(1)}</td>
                <td>${getProgressBarHtml(totalDPercent)}</td>
            </tr>`;

            tfoot.innerHTML = tfootHtml;
        }

        function updateDirectData(region, product, value) {
            if (!directData[region]) directData[region] = {};
            directData[region][product] = parseFloat(value) || 0;
            // 更新月度总计
            directMonthlySales[selectedMonth][region] = calculateRowTotal(directData, region, DIRECT_PRODUCTS);
            updateDSalesDisplay('direct');
            renderDirectTable();
            saveData(); // 保存数据
        }

        function updateInvestmentData(region, product, value) {
            if (!investmentData[region]) investmentData[region] = {};
            investmentData[region][product] = parseFloat(value) || 0;
            // 更新产品明细表格的合计列（不重新渲染整个表格）
            updateProductDetailTotal(region);
            updateDSalesDisplay('investment');
            renderInvestmentTable();
            saveData(); // 保存数据
        }

        // 更新产品明细表格中指定区域的合计列
        function updateProductDetailTotal(region) {
            const tbody = document.getElementById('investment-product-tbody');
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            rows.forEach((row, index) => {
                const regionCell = row.querySelector('td:first-child strong');
                if (regionCell && regionCell.textContent === region) {
                    // 找到对应的行，更新合计列（第5列，索引4）
                    const totalCell = row.querySelectorAll('td')[4];
                    if (totalCell) {
                        const newTotal = calculateRowTotal(investmentData, region, INVESTMENT_PRODUCTS);
                        totalCell.innerHTML = `<strong>${newTotal.toFixed(1)}</strong>`;
                    }
                }
            });
        }

        function exportToPNG() {
            const isDirect = document.getElementById('direct-tab').classList.contains('active');
            const type = isDirect ? 'direct' : 'investment';
            const tabName = isDirect ? '自营业务部' : '招商业务部';
            const monthText = selectedMonth + '月';
            const dSegText = selectedDSeg;
            const products = isDirect ? DIRECT_PRODUCTS : INVESTMENT_PRODUCTS;
            const regions = isDirect ? directRegions : investmentRegions;
            const data = isDirect ? directData : investmentData;

            // 增加高度以给环形图更多空间
            const canvasWidth = 1920;
            const canvasHeight = 1280;
            const padding = 70;
            const titleHeight = 100;
            const headerHeight = 80;
            const footerHeight = 90;

            // 计算列宽 - 自营业务部的增长额列需要更宽
            const tableWidth = canvasWidth - padding * 2;
            let colWidth;
            let growthColWidth;

            if (isDirect) {
                // 自营业务部：9列，但增长额列占用1.8倍宽度
                // 标准列数 = 8 (省区+4产品+总计+2进度)
                // 增长额列 = 1.8倍宽度
                const normalColCount = 8;
                const growthColMultiplier = 1.8;
                colWidth = tableWidth / (normalColCount + growthColMultiplier);
                growthColWidth = colWidth * growthColMultiplier;
            } else {
                // 招商业务部：7列等宽
                const numCols = 7;
                colWidth = tableWidth / numCols;
                growthColWidth = colWidth;
            }

            // 自营业务部需要25年均值数据，招商业务部不需要
            const lastYearData = isDirect ? directLastYear : null;

            // 收集表格数据并排序
            const regionDataList = [];
            regions.forEach(region => {
                // 招商业务部使用用户输入的月度累计销售额，自营业务部使用产品明细计算
                const rowTotal = isDirect
                    ? calculateRowTotal(data, region, products)
                    : (investmentMonthlySales[selectedMonth]?.[region] || 0);
                const target = getCurrentTarget(type, region);
                const lastYear = isDirect ? (lastYearData?.[region] || 0) : 0;
                const dTarget = getCurrentDTarget(type, region);
                const dSales = getCurrentDSales(type, region);
                const percent = target > 0 ? ((rowTotal / target) * 100) : 0;
                const dPercent = dTarget > 0 ? ((dSales / dTarget) * 100) : 0;
                // 计算增长额（仅自营业务部需要）
                const growth = isDirect ? (rowTotal - lastYear) : 0;

                regionDataList.push({
                    region,
                    values: products.map(p => data[region]?.[p] || 0),
                    rowTotal,
                    target,
                    lastYear,
                    growth,
                    dTarget,
                    dSales,
                    percent,
                    dPercent
                });
            });
            regionDataList.sort((a, b) => b.percent - a.percent);

            // 计算各部分尺寸（基于canvas大小和数据行数）
            const availableHeight = canvasHeight - titleHeight - padding * 2 - footerHeight;
            const headerRowsCount = isDirect ? 2 : 1;
            const dataHeight = availableHeight - headerHeight * headerRowsCount;
            const rowCount = regionDataList.length + 1; // +1 for footer
            const rowHeight = dataHeight / rowCount;

            // 计算合计行
            const grandTotal = isDirect
                ? regions.reduce((sum, r) => sum + calculateRowTotal(data, r, products), 0)
                : regions.reduce((sum, r) => sum + (investmentMonthlySales[selectedMonth]?.[r] || 0), 0);
            const grandTarget = regions.reduce((sum, r) => sum + getCurrentTarget(type, r), 0);
            const grandDTarget = regions.reduce((sum, r) => sum + getCurrentDTarget(type, r), 0);
            const grandDSales = regions.reduce((sum, r) => sum + getCurrentDSales(type, r), 0);
            const grandLastYear = isDirect ? regions.reduce((sum, r) => sum + (lastYearData?.[r] || 0), 0) : 0;
            const totalPercent = grandTarget > 0 ? ((grandTotal / grandTarget) * 100) : 0;
            const totalDPercent = grandDTarget > 0 ? ((grandDSales / grandDTarget) * 100) : 0;

            // 创建canvas - 16:9 比例，高分辨率
            const canvas = document.createElement('canvas');
            const scale = 2; // 2倍分辨率
            canvas.width = canvasWidth * scale;
            canvas.height = canvasHeight * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);

            // 绘制背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            let y = padding;

            // 绘制标题 - 增大字体以适应16:9画布
            ctx.fillStyle = '#1e3a5f';
            ctx.font = 'bold 38px "Noto Sans SC", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(`${tabName}销售进度公示`, canvasWidth / 2, y);

            // 绘制下划线
            ctx.strokeStyle = '#c9a227';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvasWidth * 0.2, y + 50);
            ctx.lineTo(canvasWidth * 0.8, y + 50);
            ctx.stroke();

            y += titleHeight;

            // 获取颜色的辅助函数
            function getColor(percent) {
                if (percent > 100) return '#1e7e44';
                if (percent >= 50) return '#2d9a6e';
                if (percent >= 20) return '#d9a634';
                return '#c9453b';
            }

            // 绘制单元格 - 优化版本
            function drawCell(x, y, w, h, text, bgColor = '#f0f6fc', textColor = '#1e3a5f', fontSize = 18, bold = false) {
                // 背景
                ctx.fillStyle = bgColor;
                ctx.fillRect(x, y, w, h);

                // 边框 - 更清晰的线条
                ctx.strokeStyle = '#c5d5e0';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(x, y, w, h);

                if (text) {
                    ctx.fillStyle = textColor;
                    const fontWeight = bold ? 'bold' : 'normal';
                    ctx.font = `${fontWeight} ${fontSize}px "Noto Sans SC", "Microsoft YaHei", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    const lines = text.split('\n');
                    if (lines.length === 1) {
                        ctx.fillText(text, x + w / 2, y + h / 2);
                    } else {
                        const lineHeight = fontSize * 1.2;
                        const totalHeight = (lines.length - 1) * lineHeight;
                        lines.forEach((line, i) => {
                            ctx.fillText(line, x + w / 2, y + h / 2 - totalHeight / 2 + i * lineHeight);
                        });
                    }
                }
            }

            // 绘制环形饼图 - 优化版本
            function drawPieChart(centerX, centerY, radius, percent) {
                const color = getColor(percent);
                const innerR = radius * 0.5;
                const displayPercent = Math.min(percent, 100);
                const angle = (displayPercent / 100) * Math.PI * 2;

                // 背景圆环
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.arc(centerX, centerY, innerR, 0, Math.PI * 2, true);
                ctx.fillStyle = '#e5ebf0';
                ctx.fill();

                // 进度扇形
                if (displayPercent > 0) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, -Math.PI / 2, -Math.PI / 2 + angle);
                    ctx.arc(centerX, centerY, innerR, -Math.PI / 2 + angle, -Math.PI / 2, true);
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                }

                // 百分比文字 - 增大字体以适应更大的环形图
                const fontSize = 24; // 增大字体
                const textColor = percent > 100 ? '#000000' : color;
                ctx.fillStyle = textColor;
                ctx.font = `bold ${fontSize}px "Noto Sans SC", "Microsoft YaHei", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(Math.round(percent) + '%', centerX, centerY);
            }

            // 圆角矩形辅助函数
            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            // 绘制增长条 - 优化布局，数字左对齐，进度条适中
            function drawGrowthBar(x, y, w, h, value) {
                const growthValue = value || 0;
                const absGrowth = Math.abs(growthValue);
                const isPositive = growthValue >= 0;
                const color = isPositive ? '#2d9a6e' : '#c9453b'; // 正增长绿色，负增长红色

                // 布局参数 - 紧凑且美观
                const leftPad = 16; // 左边距
                const rightPad = 16; // 右边距
                const numWidth = 100; // 数字预留宽度
                const gap = 12; // 数字与进度条间距

                // 计算进度条可用宽度
                const barMaxWidth = w - leftPad - numWidth - gap - rightPad;

                // 绘制边框
                ctx.strokeStyle = '#c5d5e0';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                // 绘制数字 - 左对齐，固定位置
                ctx.fillStyle = color;
                ctx.font = 'bold 26px "Noto Sans SC", "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                const numX = x + leftPad;
                ctx.fillText(`${isPositive ? '+' : ''}${growthValue.toFixed(1)}`, numX, y + h / 2);

                // 绘制进度条背景
                const barX = numX + numWidth;
                const barY = y + h / 2 - 6;
                const barH = 12;
                ctx.fillStyle = '#e5ebf0';
                roundRect(ctx, barX, barY, barMaxWidth, barH, 5);
                ctx.fill();

                // 绘制进度条填充
                const maxGrowth = 100;
                const fillRatio = Math.min(absGrowth / maxGrowth, 1);
                const fillWidth = Math.max(barMaxWidth * fillRatio, 0);

                if (fillWidth > 0) {
                    ctx.fillStyle = color;
                    roundRect(ctx, barX, barY, fillWidth, barH, 5);
                    ctx.fill();
                }
            }

            // 绘制数据条（用于招商业务部进度显示）
            function drawProgressBar(x, y, w, h, percent) {
                const color = getColor(percent);
                const displayPercent = Math.min(Math.max(percent, 0), 100);
                const barPadding = 16;
                const barWidthAvailable = w - barPadding * 2;
                const barFillWidth = Math.max((displayPercent / 100) * barWidthAvailable, 0);
                const barHeight = 14;
                const barY = y + h * 0.3;
                const barX = x + barPadding;

                // 绘制边框
                ctx.strokeStyle = '#c5d5e0';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                // 进度条背景
                ctx.fillStyle = '#e5ebf0';
                roundRect(ctx, barX, barY, barWidthAvailable, barHeight, 6);
                ctx.fill();

                // 进度条填充
                if (barFillWidth > 0) {
                    ctx.fillStyle = color;
                    roundRect(ctx, barX, barY, Math.max(barFillWidth, 6), barHeight, 6);
                    ctx.fill();
                }

                // 百分比文字
                ctx.fillStyle = color;
                ctx.font = 'bold 20px Arial, "Noto Sans SC", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(percent.toFixed(1) + '%', x + w / 2, barY + barHeight + 20);
            }

            // 绘制表头 - 区分招商业务部和自营业务部
            let headerY = y; // 保存表头起始位置
            let headerRows = 1; // 默认单行表头

            let x = padding;

            if (isDirect) {
                // ========== 自营业务部 - 两行表头 ==========
                headerRows = 2;
                const headerRowHeight = headerHeight;
                const totalHeaderHeight = headerHeight * 2;

                // 1. 省区列 - 合并两行
                drawCell(x, y, colWidth, totalHeaderHeight, '省区', '#d5e4f5', '#1e3a5f', 28, true);
                x += colWidth;

                // 2. 销售额列 - 第一行（合并多列）
                const salesWidth = 4 * colWidth;
                drawCell(x, y, salesWidth, headerRowHeight, `${monthText}销售额（万元）`, '#d5e4f5', '#1e3a5f', 28, true);
                x += salesWidth;

                // 3. 总计列 - 合并两行
                drawCell(x, y, colWidth, totalHeaderHeight, '总计', '#d5e4f5', '#1e3a5f', 28, true);
                x += colWidth;

                // 4. 月累计进度 - 合并两行
                drawCell(x, y, colWidth, totalHeaderHeight, `${monthText}累计\n销售进度`, '#d5e4f5', '#1e3a5f', 24, true);
                x += colWidth;

                // 5. D累计进度 - 合并两行
                drawCell(x, y, colWidth, totalHeaderHeight, `${dSegText}累计\n销售进度`, '#d5e4f5', '#1e3a5f', 24, true);
                x += colWidth;

                // 6. vs25均值增长额 - 合并两行，使用更宽的列宽
                drawCell(x, y, growthColWidth, totalHeaderHeight, 'vs25均值\n增长额', '#d5e4f5', '#1e3a5f', 24, true);

                // 绘制第二行表头（产品名称）
                x = padding + colWidth;
                ['吡美莫司', '火把花根', '皮肤处方药', '皮肤非药'].forEach((name) => {
                    drawCell(x, headerY + headerRowHeight, colWidth, headerRowHeight, name, '#e8f0f5', '#556677', 24, true);
                    x += colWidth;
                });

                y = headerY + totalHeaderHeight;
            } else {
                // ========== 招商业务部 - 单行表头 ==========
                drawCell(x, y, colWidth, headerHeight, '区域', '#d5e4f5', '#1e3a5f', 28, true);
                x += colWidth;

                drawCell(x, y, colWidth, headerHeight, `${monthText}指标`, '#d5e4f5', '#1e3a5f', 26, true);
                x += colWidth;

                drawCell(x, y, colWidth, headerHeight, `${monthText}累计销售额`, '#d5e4f5', '#1e3a5f', 26, true);
                x += colWidth;

                drawCell(x, y, colWidth, headerHeight, `${monthText}销售进度`, '#d5e4f5', '#1e3a5f', 24, true);
                x += colWidth;

                drawCell(x, y, colWidth, headerHeight, `${dSegText}指标`, '#d5e4f5', '#1e3a5f', 24, true);
                x += colWidth;

                drawCell(x, y, colWidth, headerHeight, `${dSegText}累计销售额`, '#d5e4f5', '#1e3a5f', 24, true);
                x += colWidth;

                drawCell(x, y, colWidth, headerHeight, `${dSegText}销售进度`, '#d5e4f5', '#1e3a5f', 24, true);

                y = headerY + headerHeight;
            }

            // 绘制数据行
            regionDataList.forEach((rowData, idx) => {
                x = padding;
                const bgColor = idx % 2 === 0 ? '#ffffff' : '#f8fbff';

                if (isDirect) {
                    // ========== 自营业务部数据行 ==========
                    // 省区列
                    drawCell(x, y, colWidth, rowHeight, rowData.region, bgColor, '#1e3a5f', 26, true);
                    x += colWidth;

                    // 产品销售额
                    rowData.values.forEach(v => {
                        drawCell(x, y, colWidth, rowHeight, v.toString(), bgColor, '#1a2738', 26, false);
                        x += colWidth;
                    });

                    // 总计列
                    drawCell(x, y, colWidth, rowHeight, rowData.rowTotal.toString(), bgColor, '#1a2738', 26, true);
                    x += colWidth;

                    // 月累计进度饼图
                    const pie1X = x + colWidth / 2;
                    const pie1Y = y + rowHeight / 2;
                    drawPieChart(pie1X, pie1Y, 40, rowData.percent);
                    ctx.strokeStyle = '#c5d5e0';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, colWidth, rowHeight);
                    x += colWidth;

                    // D段进度饼图
                    const pie2X = x + colWidth / 2;
                    const pie2Y = y + rowHeight / 2;
                    drawPieChart(pie2X, pie2Y, 40, rowData.dPercent);
                    ctx.strokeStyle = '#c5d5e0';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, colWidth, rowHeight);
                    x += colWidth;

                    // vs25均值增长额列 - 使用增长额数据条，更宽的列宽
                    drawGrowthBar(x, y, growthColWidth, rowHeight, rowData.growth);
                } else {
                    // ========== 招商业务部数据行 ==========
                    drawCell(x, y, colWidth, rowHeight, rowData.region, bgColor, '#1e3a5f', 26, true);
                    x += colWidth;

                    // 月指标
                    drawCell(x, y, colWidth, rowHeight, rowData.target.toString(), bgColor, '#1a2738', 26, false);
                    x += colWidth;

                    // 月累计达成
                    drawCell(x, y, colWidth, rowHeight, rowData.rowTotal.toString(), bgColor, '#1a2738', 26, true);
                    x += colWidth;

                    // 月销售进度数据条
                    drawProgressBar(x, y, colWidth, rowHeight, rowData.percent);
                    x += colWidth;

                    // C段指标
                    drawCell(x, y, colWidth, rowHeight, rowData.dTarget.toString(), bgColor, '#1a2738', 26, false);
                    x += colWidth;

                    // C段累计达成
                    drawCell(x, y, colWidth, rowHeight, rowData.dSales.toFixed(1).toString(), bgColor, '#1a2738', 26, true);
                    x += colWidth;

                    // C段销售进度数据条
                    drawProgressBar(x, y, colWidth, rowHeight, rowData.dPercent);
                }

                y += rowHeight;
            });

            // 绘制合计行
            x = padding;
            const footerY = y;

            // 合计行背景渐变
            const gradient = ctx.createLinearGradient(x, y, x + tableWidth, y);
            gradient.addColorStop(0, '#fef8ed');
            gradient.addColorStop(1, '#fef3e0');
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, tableWidth, rowHeight);

            drawCell(x, y, colWidth, rowHeight, tabName, 'transparent', '#b8860b', 26, true);
            x += colWidth;

            if (isDirect) {
                // 自营业务部合计行
                products.forEach((_, i) => {
                    const productTotal = regions.reduce((sum, r) => sum + (data[r]?.[products[i]] || 0), 0);
                    drawCell(x, y, colWidth, rowHeight, productTotal.toString(), 'transparent', '#1a2738', 26, false);
                    x += colWidth;
                });

                drawCell(x, y, colWidth, rowHeight, grandTotal.toString(), 'transparent', '#1a2738', 26, true);
                x += colWidth;

                drawPieChart(x + colWidth / 2, y + rowHeight / 2, 40, totalPercent);
                ctx.strokeStyle = '#c5d5e0';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, colWidth, rowHeight);
                x += colWidth;

                drawPieChart(x + colWidth / 2, y + rowHeight / 2, 40, totalDPercent);
                ctx.strokeStyle = '#c5d5e0';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, colWidth, rowHeight);
                x += colWidth;

                // vs25均值增长额合计 - 使用增长额数据条，更宽的列宽
                const grandGrowth = grandTotal - grandLastYear;
                drawGrowthBar(x, y, growthColWidth, rowHeight, grandGrowth);
            } else {
                // 招商业务部合计行
                // 月指标
                drawCell(x, y, colWidth, rowHeight, grandTarget.toFixed(1).toString(), 'transparent', '#1a2738', 26, false);
                x += colWidth;

                // 月累计达成
                drawCell(x, y, colWidth, rowHeight, grandTotal.toFixed(1).toString(), 'transparent', '#1a2738', 26, true);
                x += colWidth;

                // 月销售进度数据条
                drawProgressBar(x, y, colWidth, rowHeight, totalPercent);
                x += colWidth;

                // C段指标
                drawCell(x, y, colWidth, rowHeight, grandDTarget.toFixed(1).toString(), 'transparent', '#1a2738', 26, false);
                x += colWidth;

                // C段累计达成
                drawCell(x, y, colWidth, rowHeight, grandDSales.toFixed(1).toString(), 'transparent', '#1a2738', 26, true);
                x += colWidth;

                // C段销售进度数据条
                drawProgressBar(x, y, colWidth, rowHeight, totalDPercent);
            }

            // 合计行顶部边框 - 更粗更明显
            ctx.strokeStyle = '#c9a227';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(padding, footerY);
            ctx.lineTo(padding + tableWidth, footerY);
            ctx.stroke();

            // 下载图片 - 最高质量
            const link = document.createElement('a');
            const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
            link.download = `${tabName}_${monthText}_销售报表_${dateStr}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initData();

            // 获取当前活动 tab，而不是硬编码
            const isDirectActive = document.getElementById('direct-tab').classList.contains('active');
            const activeTab = isDirectActive ? 'direct' : 'investment';

            // 根据活动 tab 初始化段选择器
            updateSegSelector(activeTab);
            updateTableHeaders();
            renderMetricsPanel('direct');
            renderMetricsPanel('investment');
            renderDirectTable();
            renderInvestmentTable();
        });
    </script>
</body>
